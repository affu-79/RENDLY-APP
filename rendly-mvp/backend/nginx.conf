worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 4096;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 20M;

    upstream auth_service {
        server auth-service:3001;
    }

    upstream user_service {
        server user-service:3002;
    }

    upstream matching_service {
        server matching-service:3003;
    }

    upstream ccs_service {
        server ccs-service:3004;
    }

    upstream video_service {
        server video-service:3005;
    }

    upstream moderation_service {
        server moderation-service:3006;
    }

    upstream huddle_service {
        server huddle-service:3007;
    }

    upstream admin_service {
        server admin-service:3008;
    }

    server {
        listen 80;
        server_name _;

        add_header Access-Control-Allow-Origin * always;
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type" always;

        if ($request_method = OPTIONS) {
            return 204;
        }

        location /api/auth {
            proxy_pass http://auth_service;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
        }

        location /api/users {
            proxy_pass http://user_service;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }

        location /api/match {
            proxy_pass http://matching_service;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }

        location /socket.io {
            proxy_pass http://ccs_service;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/chat {
            proxy_pass http://ccs_service;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
        }

        location /api/video {
            proxy_pass http://video_service;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
        }

        location /api/moderation {
            proxy_pass http://moderation_service;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }

        location /api/huddles {
            proxy_pass http://huddle_service;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
        }

        location /api/admin {
            proxy_pass http://admin_service;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }

        location /health {
            add_header Content-Type text/plain;
            add_header Access-Control-Allow-Origin *;
            return 200 "healthy";
        }
    }
}
